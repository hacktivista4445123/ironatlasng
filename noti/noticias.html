<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON ATLAS | FEED</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
--r:#ff0022;
--b:#050505;
--txt:#eaeaea;
}

body{
background:var(--b);
color:var(--txt);
font-family:'Rajdhani',sans-serif;
margin:0;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#000;
border-bottom:1px solid #222;
}

.nav-brand{
font-family:'Cinzel';
letter-spacing:4px;
color:#fff;
}

/* HEADER */
.news-header{
text-align:center;
margin:40px 0;
}

.news-header h1{
font-family:'Cinzel';
font-size:3rem;
letter-spacing:8px;
color:#fff;
text-shadow:0 0 20px var(--r);
}

.news-header p{
font-family:'Share Tech Mono';
color:#aaa;
}

/* GRID */
.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.news-card{
background:#0a0a0a;
border:1px solid #222;
transition:0.3s;
}

.news-card:hover{
transform:translateY(-8px);
border-color:var(--r);
}

/* IMAGE */
.news-img{
width:100%;
height:200px;
object-fit:cover;
filter:brightness(0.7);
}

/* CONTENT */
.news-content{
padding:20px;
}

.news-date{
font-size:12px;
color:#888;
}

.news-title{
font-family:'Cinzel';
color:#fff;
font-size:1.2rem;
margin:10px 0;
}

.news-desc{
color:#bbb;
font-size:14px;
line-height:1.5;
}

.btn-read{
display:inline-block;
margin-top:15px;
color:var(--r);
text-decoration:none;
font-weight:bold;
}

.btn-read:hover{
text-shadow:0 0 10px var(--r);
}

/* FILTER */
.filter-bar{
text-align:center;
margin-bottom:20px;
}

.filter-btn{
background:#111;
border:1px solid #333;
color:#aaa;
padding:10px 20px;
cursor:pointer;
margin:5px;
}

.filter-btn.active,
.filter-btn:hover{
color:#fff;
border-color:var(--r);
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:#555;
border-top:1px solid #222;
}

</style>
</head>

<body>

<nav>
<div class="nav-brand">IRON ATLAS</div>
</nav>

<header class="news-header">
<h1>CENTRAL DE INTELIGENCIA</h1>
<p>MONITOREO GLOBAL EN TIEMPO REAL</p>
</header>

<div class="filter-bar">
<button class="filter-btn active" onclick="filterNews('all')">TODAS</button>
<button class="filter-btn" onclick="filterNews('fugas')">FUGAS</button>
<button class="filter-btn" onclick="filterNews('ops')">OPS</button>
</div>

<div class="news-grid" id="newsGrid">

<div class="news-card" data-cat="fugas">
<img class="news-img" src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b">
<div class="news-content">
<div class="news-date">10/04/2026</div>
<div class="news-title">BRECHA DE SEGURIDAD</div>
<div class="news-desc">Exposición crítica en sistemas gubernamentales detectada.</div>
<a class="btn-read" href="#">LEER MÁS</a>
</div>
</div>

<div class="news-card" data-cat="ops">
<img class="news-img" src="https://images.unsplash.com/photo-1563986768609-322da13575f3">
<div class="news-content">
<div class="news-date">08/04/2026</div>
<div class="news-title">ALIANZAS ACTIVAS</div>
<div class="news-desc">Nuevos nodos estratégicos integrados a la red.</div>
<a class="btn-read" href="#">LEER MÁS</a>
</div>
</div>

</div>

<footer>
© 2026 IRON ATLAS
</footer>

<script>
function filterNews(cat){
let cards=document.querySelectorAll(".news-card");
let btns=document.querySelectorAll(".filter-btn");

btns.forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

cards.forEach(c=>{
if(cat==="all" || c.dataset.cat===cat){
c.style.display="block";
}else{
c.style.display="none";
}
});
}
</script>

</body>
</html>
