<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRON ATLAS | Auth Gateway</title>
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../0x74_core_f4/k_v4.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-panel">
      <div class="auth-top">
        <img src="../assets/logo_ng.png" alt="Iron Atlas">
        <div>
          <h1>AUTH GATEWAY</h1>
          <p>CONTROLLED ENTRY NODE</p>
        </div>
      </div>
      <div class="sec-row">
        <input id="user" class="sec-input" type="text" placeholder="IDENTIFIER" autocomplete="off">
      </div>
      <div class="sec-row">
        <input id="pass" class="sec-input" type="password" placeholder="PASSPHRASE" autocomplete="off">
      </div>
      <button id="enter" class="sec-btn">VERIFY ACCESS</button>
      <div class="sec-msg" id="msg"></div>
    </div>
  </div>

  <script>
    (() => {
      const enter = document.getElementById('enter')
      const msg = document.getElementById('msg')
      const user = document.getElementById('user')
      const pass = document.getElementById('pass')
      const adminUserHash = '6ee7b6991c58d35f211574b40b13a57dac04a2fc3b376997c8676f3bdaebefe4'
      const adminPassHash = 'c6d30ab0202f4f8a4514bf0cbaf6638f4bf73a1d8f6f1911091cf07bba468e25'
      const hex = b => [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('')
      const sha = async t => hex(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t)))
      const verify = async () => {
        msg.textContent = 'VALIDATING...'
        const uh = await sha(user.value.trim())
        const ph = await sha(pass.value)
        if (uh === adminUserHash && ph === adminPassHash) {
          sessionStorage.setItem('ia_gate', 'ok')
          msg.style.color = '#4dffb8'
          msg.textContent = 'ACCESS GRANTED'
        } else {
          msg.style.color = '#ff9ab8'
          msg.textContent = 'ACCESS DENIED'
        }
      }
      enter.addEventListener('click', verify)
      document.addEventListener('keydown', e => {
        if (e.key === 'Enter') verify()
      })
      document.addEventListener('contextmenu', e => e.preventDefault())
    })()
  </script>
</body>
</html>
