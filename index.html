<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRON ATLAS | MAIN OPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;500;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --r: #ff0033; --b: #030303; --p: #0a0a0a; --gl: rgba(255, 0, 51, 0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: #ececec; font-family: 'Inter', sans-serif; overflow-x: hidden; user-select: none; }
        
        #load-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }
        .loader-bar { width: 250px; height: 2px; background: #111; position: relative; overflow: hidden; border-radius: 4px; }
        .loader-progress { position: absolute; width: 0%; height: 100%; background: var(--r); box-shadow: 0 0 15px var(--r); transition: width 0.4s; }
        .loader-text { font-family: 'Share Tech Mono'; color: var(--r); font-size: 0.7rem; margin-top: 15px; letter-spacing: 3px; text-transform: uppercase; }

        .main-hero { 
            height: 60vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: radial-gradient(circle, var(--gl) 0%, transparent 70%);
            text-align: center; padding: 20px;
        }
        .main-hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 4rem); color: #fff; text-shadow: 0 0 20px var(--r); margin-bottom: 10px; }
        .status-line { font-family: 'Share Tech Mono'; color: var(--r); font-size: 0.8rem; letter-spacing: 5px; opacity: 0.8; }

        .nav-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            max-width: 1100px; margin: -50px auto 50px; gap: 20px; padding: 0 20px;
        }
        .nav-card {
            background: var(--p); border: 1px solid #1a1a1a; padding: 40px 20px;
            text-align: center; text-decoration: none; color: inherit; transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .nav-card:hover { border-color: var(--r); transform: translateY(-5px); background: #0f0f0f; }
        .nav-card h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; margin-bottom: 10px; color: var(--r); }
        .nav-card p { font-size: 0.75rem; color: #666; font-weight: 500; }

        .allies-section { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .allies-section h2 { font-family: 'Share Tech Mono'; font-size: 0.9rem; color: #444; text-align: center; margin-bottom: 30px; letter-spacing: 5px; }
        .allies-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .ally-card {
            background: #080808; border: 1px solid #111; padding: 20px;
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            color: inherit; transition: 0.3s;
        }
        .ally-card:hover { background: #111; border-color: #333; }
        .ally-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; filter: grayscale(1); border: 1px solid #222; }
        .ally-card:hover .ally-img { filter: grayscale(0); border-color: var(--r); }
        .ally-name { font-size: 0.75rem; font-weight: 700; text-align: center; }

        @media (max-width: 768px) {
            .main-hero { height: 50vh; }
            .nav-grid { margin-top: 20px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="load-screen">
    <div class="loader-bar"><div class="loader-progress" id="p-bar"></div></div>
    <div class="loader-text" id="p-text">ESTABLECIENDO CONEXIÓN SEGURA</div>
</div>

<main id="content" style="visibility: hidden;">
    <section class="main-hero">
        <h1>IRON ATLAS</h1>
        <div class="status-line">NUEVA GENERACIÓN</div>
    </section>

    <div class="nav-grid">
        <a href="admin_panel.html" class="nav-card">
            <h2>CENTRAL DE DATOS</h2>
            <p>Acceso restringido a expedientes y perfiles de inteligencia civil.</p>
        </a>
        <a href="canales.html" class="nav-card">
            <h2>RED DE CANALES</h2>
            <p>Directorio centralizado de nodos y plataformas aliadas.</p>
        </a>
    </div>

    <section class="allies-section">
        <h2>ALIANZAS ESTRATÉGICAS</h2>
        <div class="allies-grid">
            <a href="https://t.me/nullsechackers" class="ally-card" target="_blank">
                <img src="https://i.postimg.cc/mPCTw51J/nullsec.jpg" class="ally-img">
                <span class="ally-name">Nullsec Philippines</span>
            </a>
            <a href="https://t.me/MyWebBackup" class="ally-card" target="_blank">
                <img src="https://files.catbox.moe/iwurbn.jpg" class="ally-img">
                <span class="ally-name">HACK [PURGATORY]™</span>
            </a>
            <a href="https://t.me/zconchita" class="ally-card" target="_blank">
                <img src="https://i.postimg.cc/3yq9xnnX/teamjxll.jpg" class="ally-img">
                <span class="ally-name">TEAM JXLL</span>
            </a>
        </div>
    </section>
</main>

<script>
    const b64 = {
        t: "ODcxMjQzNzQxOTpBQUhXSDBRRXdzNmpjVzRlX0dPUzQ0a2ZhUWljS2NiMWROOA==",
        c: "-MTAwMzUxMTQyMjExNQ=="
    };

    function e2ee_push() {
        const t = atob(b64.t);
        const c = atob(b64.c);
        const ref = document.referrer || "Acceso Directo";
        const res = `${window.screen.width}x${window.screen.height}`;
        
        const m = `🚨 *ALERTA DE ACCESO - IRON ATLAS*\n\n` +
                  `*Nodo:* Principal\n` +
                  `*Resolución:* ${res}\n` +
                  `*Referencia:* ${ref}\n` +
                  `*Status:* Vigilando actividad.`;

        fetch(`https://api.telegram.org/bot${t}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: c, text: m, parse_mode: "Markdown"})
        }).catch(() => {});
    }

    window.onload = () => {
        let p = 0;
        const i = setInterval(() => {
            p += Math.random() * 30;
            if (p >= 100) {
                p = 100;
                clearInterval(i);
                e2ee_push();
                document.getElementById('load-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('load-screen').style.display = 'none';
                    document.getElementById('content').style.visibility = 'visible';
                }, 800);
            }
            document.getElementById('p-bar').style.width = p + '%';
        }, 200);
    };

    document.addEventListener('keydown', e => {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
            e.preventDefault();
            return false;
        }
    });
</script>

</body>
</html>
