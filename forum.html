<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IRON ATLAS | SECURITY FORUM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="crt-filter">

    <div class="forum-container">
        <header style="text-align: center;">
            <img src="https://i.postimg.cc/3kCVbCSY/logo-iron.png" style="width:100px; filter: grayscale(1) invert(1);">
            <h1 class="glitch-text">ACCESO AL FORO DE INTELIGENCIA</h1>
        </header>

        <div class="login-box" id="loginArea">
            <p>>_ IDENTIFÍQUESE PARA CONTINUAR</p><br>
            <input type="text" id="userInput" placeholder="USER_ID" autocomplete="off">
            <div id="passField" style="display: none;">
                <input type="password" id="passInput" placeholder="PASSWORD">
                <button onclick="checkAuth()">DESBLOQUEAR ARCHIVOS</button>
            </div>
        </div>

        <div id="adminPanel">
            <h2 style="color:var(--neon-red)">ADMIN COMMAND CENTER [GOD_MODE]</h2>
            <div class="tools">
                <p>>_ CONTROL DE RATAS EXPUUESTAS</p>
                <textarea id="ratData" placeholder="INFO DE LA RATA..."></textarea>
                <button onclick="addRat()">PUBLICAR EVIDENCIA</button>
            </div>
            <div id="exposedList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script src="forum.js"></script>
    <script src="shield.js"></script>
</body>
</html>
