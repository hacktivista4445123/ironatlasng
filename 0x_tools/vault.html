<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON ATLAS</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --r:#ff0033;
    --b:#020202;
    --p:#0a0a0a;
    --brd:#151515;
}

body {
    background: var(--b);
    color: white;
    font-family: 'Inter';
    overflow-x: hidden;
}


.bg {
    position: fixed;
    width:100%; height:100%;
    background:
    linear-gradient(rgba(255,0,51,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,51,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}


header {
    text-align:center;
    padding:80px 20px;
}

.glitch {
    font-family:'Cinzel';
    font-size:3rem;
    letter-spacing:10px;
    position:relative;
}

.glitch::before, .glitch::after {
    content: attr(data-text);
    position:absolute;
    left:0;
    width:100%;
}

.glitch::before {
    color:red;
    animation: glitch1 2s infinite;
}

.glitch::after {
    color:cyan;
    animation: glitch2 3s infinite;
}

@keyframes glitch1 {
    0%{transform:translate(0)}
    20%{transform:translate(-2px,2px)}
    40%{transform:translate(-2px,-2px)}
    60%{transform:translate(2px,2px)}
    80%{transform:translate(2px,-2px)}
    100%{transform:translate(0)}
}

@keyframes glitch2 {
    0%{transform:translate(0)}
    20%{transform:translate(2px,-2px)}
    40%{transform:translate(2px,2px)}
    60%{transform:translate(-2px,-2px)}
    80%{transform:translate(-2px,2px)}
    100%{transform:translate(0)}
}


.search-box {
    text-align:center;
    margin:40px;
}

input {
    padding:12px;
    width:250px;
    background:#111;
    border:1px solid #333;
    color:white;
}

button {
    padding:12px 20px;
    background:var(--r);
    border:none;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#ff3355;
    transform:scale(1.05);
}

/* RESULT */
.result {
    max-width:600px;
    margin:30px auto;
    padding:20px;
    background:#0f0f0f;
    border:1px solid #222;
    display:none;
}

.result div {
    padding:8px 0;
    border-bottom:1px solid #222;
}


.loader {
    display:none;
    text-align:center;
    margin-top:20px;
}

.loader span {
    display:inline-block;
    width:10px; height:10px;
    background:var(--r);
    margin:5px;
    animation: bounce 1s infinite;
}

.loader span:nth-child(2){animation-delay:.2s}
.loader span:nth-child(3){animation-delay:.4s}

@keyframes bounce {
    0%,100%{transform:scale(1)}
    50%{transform:scale(2)}
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
<h1 class="glitch" data-text="IRON ATLAS">IRON ATLAS</h1>
<p>CONSULTA ADRES</p>
</header>

<div class="search-box">
    <input type="text" id="cedula" placeholder="Ingrese cédula">
    <button onclick="consultar()">CONSULTAR</button>
</div>

<div class="loader" id="loader">
    <span></span><span></span><span></span>
</div>

<div class="result" id="resultado"></div>

<script>
async function consultar(){
    const cedula = document.getElementById("cedula").value;
    const resultBox = document.getElementById("resultado");
    const loader = document.getElementById("loader");

    resultBox.style.display = "none";
    loader.style.display = "block";

    try {
        const res = await fetch("http://TU_IP:5000/api/adres", {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "x-api-key":"ironatlas_key_123"
            },
            body: JSON.stringify({cedula})
        });

        const data = await res.json();

        loader.style.display = "none";
        resultBox.style.display = "block";

        if(data.error){
            resultBox.innerHTML = "<div style='color:red'>"+data.error+"</div>";
            return;
        }

        let html = "";

        for(let key in data){
            if(typeof data[key] === "object"){
                html += "<div><b>"+key+"</b></div>";
                for(let sub in data[key]){
                    html += `<div>${sub}: ${data[key][sub]}</div>`;
                }
            } else {
                html += `<div><b>${key}:</b> ${data[key]}</div>`;
            }
        }

        resultBox.innerHTML = html;

    } catch(e){
        loader.style.display = "none";
        resultBox.style.display = "block";
        resultBox.innerHTML = "<div style='color:red'>Error de conexión</div>";
    }
}
</script>

</body>
</html>
