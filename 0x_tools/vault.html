<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON ATLAS</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
--r:#ff0033;
--b:#030303;
--p:#0b0b0b;
--g:#00ffcc;
--t:#888;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--b);
color:#fff;
font-family:'Inter';
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(255,0,51,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,0,51,0.04) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
animation:moveBg 10s linear infinite;
}

@keyframes moveBg{
0%{background-position:0 0}
100%{background-position:100px 100px}
}

header{
text-align:center;
padding:80px 20px 40px;
}

.glitch{
font-family:'Cinzel';
font-size:3rem;
letter-spacing:10px;
position:relative;
}

.glitch::before,.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
width:100%;
}

.glitch::before{
color:red;
animation:gl1 2s infinite;
}

.glitch::after{
color:cyan;
animation:gl2 3s infinite;
}

@keyframes gl1{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(-2px,-2px)}
60%{transform:translate(2px,2px)}
80%{transform:translate(2px,-2px)}
100%{transform:translate(0)}
}

@keyframes gl2{
0%{transform:translate(0)}
20%{transform:translate(2px,-2px)}
40%{transform:translate(2px,2px)}
60%{transform:translate(-2px,-2px)}
80%{transform:translate(-2px,2px)}
100%{transform:translate(0)}
}

.subtitle{
font-family:'Share Tech Mono';
letter-spacing:4px;
color:var(--r);
opacity:.7;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

.card{
background:var(--p);
border:1px solid #111;
padding:40px;
transition:.4s;
position:relative;
overflow:hidden;
}

.card:hover{
border-color:var(--r);
box-shadow:0 0 40px rgba(255,0,51,.2);
transform:translateY(-5px);
}

.input-group{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
flex:1;
padding:15px;
background:#050505;
border:1px solid #222;
color:#fff;
font-size:14px;
}

button{
padding:15px 25px;
background:var(--r);
border:none;
color:#fff;
cursor:pointer;
transition:.3s;
font-weight:bold;
letter-spacing:1px;
}

button:hover{
background:#ff3355;
transform:scale(1.05);
}

.loader{
display:none;
text-align:center;
margin:20px 0;
}

.loader span{
display:inline-block;
width:12px;
height:12px;
background:var(--r);
margin:5px;
animation:loader 1s infinite;
}

.loader span:nth-child(2){animation-delay:.2s}
.loader span:nth-child(3){animation-delay:.4s}

@keyframes loader{
0%,100%{transform:scale(1)}
50%{transform:scale(2)}
}

.terminal{
background:#020202;
border:1px solid #111;
padding:20px;
height:350px;
overflow:auto;
font-family:'Share Tech Mono';
font-size:13px;
}

.line{
margin:5px 0;
opacity:0;
animation:fadeIn .3s forwards;
}

@keyframes fadeIn{
to{opacity:1}
}

footer{
text-align:center;
padding:60px;
color:#222;
font-family:'Share Tech Mono';
letter-spacing:3px;
}
</style>
</head>

<body oncontextmenu="return false;">

<div class="bg"></div>

<header>
<h1 class="glitch" data-text="IRON ATLAS">IRON ATLAS</h1>
<p class="subtitle">SISTEMA DE CONSULTA</p>
</header>

<div class="container">
<div class="card">

<div class="input-group">
<input type="text" id="cedula" placeholder="Ingrese cédula">
<button onclick="consultar()">CONSULTAR</button>
</div>

<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

<div class="terminal" id="terminal"></div>

</div>
</div>

<footer>
IRON ATLAS | SYSTEM CORE
</footer>

<script>

function log(text){
const term=document.getElementById("terminal");
const line=document.createElement("div");
line.className="line";
line.innerText="> "+text;
term.appendChild(line);
term.scrollTop=term.scrollHeight;
}

async function consultar(){
const cedula=document.getElementById("cedula").value;
const loader=document.getElementById("loader");

loader.style.display="block";
document.getElementById("terminal").innerHTML="";

log("Inicializando módulo...");
log("Estableciendo conexión segura...");
log("Enviando solicitud...");

try{
const res=await fetch("http://TU_IP_PUBLICA:5000/api/adres",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-api-key":"ironatlas_key_123"
},
body:JSON.stringify({cedula})
});

const data=await res.json();

loader.style.display="none";

if(data.error){
log("ERROR: "+data.error);
return;
}

log("Datos encontrados:");

for(let key in data){
if(typeof data[key]==="object"){
log("["+key+"]");
for(let sub in data[key]){
log(sub+": "+data[key][sub]);
}
}else{
log(key+": "+data[key]);
}
}

}catch(e){
loader.style.display="none";
log("ERROR DE CONEXIÓN");
}
}

document.onkeydown=function(e){
if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&e.keyCode==85)){
return false;
}
};

</script>

</body>
</html>
