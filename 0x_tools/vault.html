function analyzePhone(num){
const cc=num.substring(0,2);
const countries={'57':'Colombia','52':'México','54':'Argentina','51':'Perú','56':'Chile'};
return{
number:num,
country:countries[cc]||'Desconocido',

valid:num.length>=10,
type:num.length===10?'Mobile':'Landline',

};
}

function generateWhoisData(domain){
const tld=domain.split('.').pop();
const registrars=['GoDaddy','Namecheap','Google Domains','Cloudflare','AWS Route 53'];

domain:domain,
registrar:registrars[Math.floor(Math.random()*registrars.length)],

}

function displayDomainResults(data){

function displayUsernameResults(results,username){

html+=`<div class="result-row"><div class="result-label">STATUS</div><div class="result-value" style="color:${color}">${data.status}</div></div>`;

}
});

}

canvas.height=window.innerHeight;
const chars='01';
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];
for(let i=0;i<columns;i++)drops[i]=1;
function drawMatrix(){
ctx.fillStyle='rgba(0,0,0,0.05)';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#f00';
ctx.font=fontSize+'px monospace';
for(let i=0;i<drops.length;i++){
const text=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)drops[i]=0;
drops[i]++;
}
}
setInterval(drawMatrix,50);

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});
