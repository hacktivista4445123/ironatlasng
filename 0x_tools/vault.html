<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA EN MANTENIMIENTO | IRON ATLAS NG</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --r: #ff0033; --b: #040404; --p: #0c0c0c; --brd: #1c1c1c; --t: #b0b0b0; --amber: #ff8c00; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--t); font-family: 'Share Tech Mono', monospace; user-select: none; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .scanline { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px); }
        
        .maint-box {
            position: relative; z-index: 2; background: var(--p); border: 1px solid var(--brd);
            border-left: 5px solid var(--r); padding: clamp(20px, 5vw, 50px); max-width: 600px; width: 90%;
            text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem; color: var(--r); letter-spacing: 5px; margin-bottom: 20px; }
        
        .status-msg { font-size: 1.2rem; color: var(--amber); letter-spacing: 2px; margin-bottom: 30px; animation: blink 1.5s infinite; }
        
        .progress-container { width: 100%; height: 2px; background: #222; margin-bottom: 20px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; width: 50%; background: var(--r); position: absolute; left: -50%; animation: load 3s ease-in-out infinite; box-shadow: 0 0 15px var(--r); }

        .details { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
        @keyframes blink { 50% { opacity: 0.3; } }

        @media (max-width: 600px) { .logo { font-size: 1rem; } .status-msg { font-size: 0.9rem; } }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="bg"></canvas>
<div class="scanline"></div>

<div class="maint-box">
    <div class="logo">IRON ATLAS NEW GENERATION</div>
    <div class="status-msg">SISTEMA EN MANTENIMIENTO</div>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <div class="details">
        ▌ ACTUALIZANDO.... ▌<br>
        ▌ ACCESO TEMPORALMENTE BLOQUEADO ▌<br>
        ▌ ESTADO: mantenimiento ▌
    </div>
</div>

<script>
  
    (function(){
        'use strict';
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        const HEX_R = 58;
        let t = 0;
        function hexPath(cx,cy){
            ctx.beginPath();
            for(let i=0; i<6; i++){
                const a = Math.PI/3*i-Math.PI/6;
                i===0?ctx.moveTo(cx+HEX_R*Math.cos(a),cy+HEX_R*Math.sin(a)) :ctx.lineTo(cx+HEX_R*Math.cos(a),cy+HEX_R*Math.sin(a));
            }
            ctx.closePath();
        }
        function draw(){
            ctx.clearRect(0,0,W,H);
            const hx=HEX_R*Math.sqrt(3), hy=HEX_R*1.5;
            const cols2=Math.ceil(W/hx)+3, rows2=Math.ceil(H/hy)+3;
            for(let r=0; r<rows2; r++){
                for(let c=0; c<cols2; c++){
                    const cx=c*hx+(r%2)*hx/2-hx; const cy=r*hy-hy;
                    const wave=(Math.sin(t*.0035+cx*.007+cy*.005)+1)/2;
                    ctx.strokeStyle=`rgba(255,0,51,${wave*.045+.012})`;
                    ctx.lineWidth=.45; hexPath(cx,cy); ctx.stroke();
                }
            }
            t++; requestAnimationFrame(draw);
        }
        resize(); draw();
        window.addEventListener('resize', resize);
    })();

 
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false;
    }
</script>

</body>
</html>
