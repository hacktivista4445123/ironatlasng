<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON ATLAS | THE_VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0033; --cyan: #00f0ff; --bg: #050505; --card: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--bg); color: #eee; font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }

        .container { padding: 40px; max-width: 1200px; margin: auto; }
        header { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: var(--red); text-decoration: none; font-size: 0.8rem; border: 1px solid var(--red); padding: 5px 15px; transition: 0.3s; }
        .back-link:hover { background: var(--red); color: #000; box-shadow: 0 0 15px var(--red); }

        /* GRID DE HERRAMIENTAS */
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .tool-card { background: var(--card); border: 1px solid #1a1a1a; padding: 25px; position: relative; overflow: hidden; transition: 0.3s; }
        .tool-card:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1); }
        .tool-card h3 { color: var(--cyan); margin-bottom: 15px; font-size: 1.1rem; }
        
        /* BUSCADOR DENTRO DEL CARD */
        .search-box { display: flex; gap: 10px; margin-top: 15px; }
        input { background: #000; border: 1px solid #333; color: var(--cyan); padding: 10px; flex: 1; font-family: inherit; outline: none; }
        input:focus { border-color: var(--red); }
        button { background: var(--red); border: none; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--red); }

        /* TERMINAL DE RESULTADOS */
        .results-area { 
            margin-top: 20px; background: #000; border: 1px solid #111; padding: 15px; 
            font-size: 0.8rem; min-height: 100px; max-height: 300px; overflow-y: auto; color: #39ff14;
            white-space: pre-wrap; display: none;
        }

        .status-tag { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="letter-spacing: 5px;">THE_VAULT</h1>
            <p style="font-size: 0.7rem; color: #555;">[ MÓDULOS DE EXTRACCIÓN ACTIVOS ]</p>
        </div>
        <a href="../index.html" class="back-link">VOLVER_AL_NODO</a>
    </header>

    <div class="tools-grid">
        <div class="tool-card">
            <span class="status-tag">STABLE_V2.1</span>
            <h3>[01] CONSULTA_ADRES_COL</h3>
            <p style="font-size: 0.8rem; color: #888;">Extracción de base de datos de afiliados (BDUA). Requiere bypass de token dinámico.</p>
            
            <div class="search-box">
                <input type="text" id="target-cc" placeholder="INGRESE CÉDULA...">
                <button onclick="execAdres()">EJECUTAR</button>
            </div>

            <div id="adres-res" class="results-area"></div>
        </div>

        <div class="tool-card" style="opacity: 0.5;">
            <h3>[02] RUNT_SCANNER</h3>
            <p style="font-size: 0.8rem; color: #888;">Módulo en desarrollo... Esperando handshake de nodo central.</p>
        </div>
    </div>
</div>

<script>
    // --- OFUSCACIÓN DE LÓGICA ---
    // Usamos Base64 y encriptación simple para que el usuario no vea los endpoints en el código.
    const _0x_a = "aHR0cHM6Ly9hcGkuaXJvbi1hdGxhcy5vcmcvYWRyZXMv"; // URL de tu proxy/backend (ejemplo)

    async function execAdres() {
        const cc = document.getElementById('target-cc').value;
        const resBox = document.getElementById('adres-res');
        
        if(!cc) return alert("Cédula requerida.");

        resBox.style.display = 'block';
        resBox.textContent = `[>] Iniciando túnel... \n[>] Cédula: ${cc}\n[>] Solicitando Token de sesión...\n`;

        try {

            setTimeout(() => {
                resBox.textContent += `[+] Conexión establecida con ADRES.\n`;
                resBox.textContent += `[+] Extrayendo GridViewBasica...\n`;
                resBox.textContent += `--------------------------------\n`;
                resBox.textContent += `NOMBRE: [REDACTADO]\nESTADO: AFILIADO\nEPS: SANITAS\nREGIMEN: CONTRIBUTIVO`;
            }, 1500);

        } catch (e) {
            resBox.textContent += `\n[!] ERROR_DE_SISTEMA: ${e.message}`;
        }
    }


    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };
</script>
</body>
</html>
